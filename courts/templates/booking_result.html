{% extends "master.html" %}

{% block title %}預約結果{% endblock %}

{% block content %}

<div class="result-box">
  <div class="result-icon">
    {% if "成功" in result or "ok" in result %}🎉
    {% else %}⚠️
    {% endif %}
  </div>
  <p class="result-text">{{ result }}</p>
  <br>
  <a href="/courts/" class="btn btn-secondary" style="margin-top:16px;">← 返回球場列表</a>
</div>

{% endblock %}
