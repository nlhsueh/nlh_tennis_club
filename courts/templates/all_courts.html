{% extends "master.html" %}

{% block title %}
  My Tennis Club - List of all courts
{% endblock %}


{% block content %}

<div class="container">
  <h3 class="text-success">Courts</h3>
  
  <select name="court-type" class="form-select mb-3"
          hx-get="{% url 'courts' %}"
          hx-target="#court-list"
          hx-include="[name='city']">
    <option value="">全部類型</option>
    <option value="G">草地 (G)</option>
    <option value="H">硬地 (H)</option>
  </select>

  <div id="court-list">
    {% include "fragments/court_list.html" %}
  </div>

  <!-- Modal for Court Details -->
  <div class="modal fade" id="courtModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content" id="court-detail-modal">
        <!-- Content loaded via HTMX will appear here -->
      </div>
    </div>
  </div>

  <!-- JavaScript to show modal -->
  <script>
    function showModal() {
      var myModal = new bootstrap.Modal(document.getElementById('courtModal'));
      myModal.show();
    }
  </script>

</div>  

{% endblock %}
