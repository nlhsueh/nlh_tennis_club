{% extends "master.html" %}

{% block title %}My Tennis Club - 球場列表{% endblock %}

{% block content %}

<h1 class="page-title">所有球場</h1>

<ul class="item-list">
  {% for x in courts %}
  <li>
    <a href="{% url 'court_details' x.id %}">{{ x.courtname }}</a>
    <span class="item-meta">{{ x.city }}</span>
  </li>
  {% endfor %}
</ul>

{% endblock %}
