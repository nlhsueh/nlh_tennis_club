{% extends "master.html" %}

{% block title %}{{ court.courtname }} — 球場詳情{% endblock %}

{% block content %}

<h1 class="page-title">
  {{ court.courtname }}
  <span class="subtitle">{{ court.city }}</span>
</h1>

<div class="detail-card">
  <div class="detail-row">
    <span class="label">所在城市</span>
    <span class="value">{{ court.city }}</span>
  </div>
  <div class="detail-row">
    <span class="label">球場名稱</span>
    <span class="value">{{ court.courtname }}</span>
  </div>
</div>

<div style="display:flex; gap:10px; flex-wrap:wrap;">
  <a href="{% url 'booking' court.id %}" class="btn btn-clay">📅 預約此球場</a>
  <a href="/courts/" class="back-link">← 返回球場列表</a>
</div>

{% endblock %}
