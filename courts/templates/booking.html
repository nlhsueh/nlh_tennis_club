{% extends "master.html" %}

{% block title %}預約球場{% endblock %}

{% block content %}

<h1 class="page-title">
  預約球場
  <span class="subtitle">請填寫以下預約資訊</span>
</h1>

<div class="form-card">
  <form action="." method="post">
    {% csrf_token %}

    <div class="form-field">
      <label>{{ booking_form.user.label }}</label>
      {{ booking_form.user }}
    </div>

    <div class="form-field">
      <label>球場</label>
      {{ booking_form.court }}
    </div>

    <div class="form-field">
      <label>{{ booking_form.date.label }}</label>
      {{ booking_form.date }}
    </div>

    <input type="submit" value="✅ 確定預約">
  </form>
</div>

{% endblock %}
